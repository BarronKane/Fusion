[package]
name = "fd-net-chipset-infineon-cyw43439"
description = ""
documentation = ""
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
build = "build.rs"

[lib]
crate-type = ["rlib", "cdylib"]
path = "cyw43439.rs"

[features]
default = []
std = ["fusion-hal/std", "fd-bus-gpio/std"]
soc = ["fusion-hal/soc", "fd-bus-gpio/soc"]
hosted = ["std", "fusion-hal/hosted", "fd-bus-gpio/hosted"]
critical-safe = ["fusion-hal/critical-safe", "fd-bus-gpio/critical-safe"]
debug-profile = ["fusion-hal/debug-profile", "fd-bus-gpio/debug-profile"]
debug-insights = ["fusion-hal/debug-insights", "fd-bus-gpio/debug-insights"]
fdxe-module = []
sys-cortex-m = ["soc", "fusion-hal/sys-cortex-m", "fd-bus-gpio/sys-cortex-m"]
soc-rp2350 = ["sys-cortex-m", "fusion-hal/soc-rp2350", "fd-bus-gpio/soc-rp2350"]
sys-fusion-kn = ["hosted", "fusion-hal/sys-fusion-kn", "fd-bus-gpio/sys-fusion-kn"]
cortex-m-vector-secure-world = ["fusion-hal/cortex-m-vector-secure-world", "fd-bus-gpio/cortex-m-vector-secure-world"]
cortex-m-vector-nonsecure-world = ["fusion-hal/cortex-m-vector-nonsecure-world", "fd-bus-gpio/cortex-m-vector-nonsecure-world"]
[dependencies]
bitflags.workspace = true
fd-bus-gpio = { path = "../../../../bus/gpio", default-features = false }
fusion-hal = { workspace = true, default-features = false }

[lints]
workspace = true
