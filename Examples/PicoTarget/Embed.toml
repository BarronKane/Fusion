[default.probe]
protocol = "Swd"
speed = 20_000

[default.flashing]
enabled = true

[default.reset]
enabled = true
halt_afterwards = false

[default.general]
chip = "RP235x"
log_level = "WARN"
connect_under_reset = false

[default.rtt]
enabled = true
up_mode = "NoBlockSkip"
timeout = 3000
log_enabled = false
log_path = "./logs"

[default.gdb]
enabled = false
gdb_connection_string = "127.0.0.1:2345"
