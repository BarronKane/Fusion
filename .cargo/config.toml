[alias]
pico-build = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "build"]
pico-uf2 = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "uf2"]
pico-flash = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "probe-flash"]
pico-run = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "probe-run"]
pico-attach = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "probe-attach"]
pico-display-build = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "build", "--manifest-path", "Examples/Cortex-M/RP2350/Display/Cargo.toml", "--bin", "rp2350_display"]
pico-display-uf2 = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "uf2", "--manifest-path", "Examples/Cortex-M/RP2350/Display/Cargo.toml", "--bin", "rp2350_display"]
pico-display-flash = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "probe-flash", "--manifest-path", "Examples/Cortex-M/RP2350/Display/Cargo.toml", "--bin", "rp2350_display"]
pico-display-run = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "probe-run", "--manifest-path", "Examples/Cortex-M/RP2350/Display/Cargo.toml", "--bin", "rp2350_display"]
pico-display-attach = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "probe-attach", "--manifest-path", "Examples/Cortex-M/RP2350/Display/Cargo.toml", "--bin", "rp2350_display"]
pico-display-debug-server = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "debug-server", "--manifest-path", "Examples/Cortex-M/RP2350/Display/Cargo.toml", "--bin", "rp2350_display"]
pico-benchmark = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "benchmark", "--manifest-path", "Examples/Cortex-M/RP2350/Benchmark/Cargo.toml", "--bin", "rp2350_benchmark"]
pico-debug-server = ["run", "-p", "fusion-std", "--bin", "fusion_std_pico_tool", "--", "debug-server"]
